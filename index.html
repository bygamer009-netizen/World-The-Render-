<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Render Studio - Móvil</title>
    <!-- Cargamos Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls con soporte táctil para celulares -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        /* Estilos Base - Optimizados para pantallas táctiles */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* Quita el destello azul al tocar en Android */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #0c0214;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: -webkit-fill-available; /* Ajuste para navegadores móviles */
            overflow: hidden;
        }

        html {
            height: -webkit-fill-available;
        }

        /* Contenedor del Visualizador (Ocupa la mitad superior/completa de la pantalla) */
        #viewer-container {
            flex: 1;
            position: relative;
            background: radial-gradient(circle, #200735 0%, #06010d 100%);
            width: 100%;
        }

        #canvas-3d {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Marca de agua flotante */
        #viewer-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            pointer-events: none;
            color: rgba(188, 19, 254, 0.7);
            font-family: monospace;
            font-size: 0.75rem;
            text-shadow: 0 0 5px rgba(188, 19, 254, 0.5);
        }

        /* Panel de Control (Abajo en móviles) */
        #sidebar {
            height: 45vh; /* Ocupa el 45% inferior de la pantalla */
            background: rgba(15, 4, 26, 0.95);
            border-top: 3px solid #bc13fe;
            box-shadow: 0 -5px 25px rgba(188, 19, 254, 0.4);
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
            overflow-y: auto; /* Permite hacer scroll en los controles si la pantalla es chica */
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }

        h1 {
            font-size: 1.2rem;
            text-align: center;
            color: #ef00e6;
            text-shadow: 0 0 8px #ef00e6, 0 0 15px #bc13fe;
            margin: 0;
            padding-bottom: 5px;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00f0ff;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
            padding-bottom: 4px;
            margin-bottom: 8px;
            display: block;
        }

        /* Botón de Carga de Archivos optimizado para dedos */
        .file-upload {
            width: 100%;
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .file-upload-label {
            display: block;
            padding: 12px;
            background: linear-gradient(45deg, #bc13fe, #ef00e6);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 0 0 15px rgba(239, 0, 230, 0.3);
            transition: transform 0.1s ease;
        }

        .file-upload-label:active {
            transform: scale(0.97); /* Feedback visual al tocar en Android */
        }

        /* Controles */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.8rem;
            color: #e0b0ff;
        }

        select {
            background: #150624;
            border: 1px solid #bc13fe;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            outline: none;
            font-size: 0.9rem;
            height: 40px; /* Tamaño cómodo para tocar con el dedo */
        }

        /* Estilo para los controles deslizables (sliders) */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #150624;
            border-radius: 3px;
            outline: none;
            border: 1px solid #bc13fe;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00f0ff;
            box-shadow: 0 0 8px #00f0ff;
            cursor: pointer;
        }

        /* Botón Guardar Render */
        .btn-render {
            background: transparent;
            border: 2px solid #00f0ff;
            color: #00f0ff;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            text-shadow: 0 0 5px #00f0ff;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.15);
            margin-top: 10px;
            width: 100%;
        }

        .btn-render:active {
            background: #00f0ff;
            color: #000;
            box-shadow: 0 0 20px #00f0ff;
        }
    </style>
</head>
<body>

    <!-- ÁREA DE VISUALIZACIÓN 3D (ARRIBA) -->
    <div id="viewer-container">
        <div id="viewer-overlay">STUDIO MÓVIL v1.1</div>
        <canvas id="canvas-3d"></canvas>
    </div>

    <!-- PANEL DE CONTROL (ABAJO) -->
    <div id="sidebar">
        <h1>RENDER STUDIO</h1>
        
        <!-- 1. Cargar Skin -->
        <div class="control-group">
            <span class="section-title">1. Skin de Minecraft (PNG)</span>
            <div class="file-upload">
                <label for="skin-input" class="file-upload-label">Seleccionar PNG de Galería</label>
                <!-- accept="image/*" abre directamente la app de fotos/galería de Android -->
                <input type="file" id="skin-input" accept="image/png, image/jpeg">
            </div>
        </div>

        <!-- 2. Iluminación y Sombras -->
        <div class="control-group">
            <span class="section-title">2. Iluminación y Sombra</span>
            
            <label for="light-color">Color de Luz</label>
            <select id="light-color">
                <option value="#ffffff">Blanco Clásico</option>
                <option value="#bc13fe" selected>Morado Neón</option>
                <option value="#00f0ff">Azul Cyberpunk</option>
                <option value="#ff0055">Rosa Eléctrico</option>
            </select>

            <label for="shadow-intensity">Intensidad de Sombra</label>
            <input type="range" id="shadow-intensity" min="0" max="1" step="0.1" value="0.7">

            <label for="light-angle">Dirección de la Luz</label>
            <input type="range" id="light-angle" min="-3" max="3" step="0.1" value="1">
        </div>

        <!-- 3. Accesorios -->
        <div class="control-group">
            <span class="section-title">3. Equipamiento</span>
            <label for="hand-item">Objeto en Mano</label>
            <select id="hand-item">
                <option value="none">Ninguno</option>
                <option value="sword">Espada de Diamante</option>
                <option value="pickaxe">Pico</option>
            </select>
        </div>

        <!-- Botón Exportar -->
        <button class="btn-render" id="btn-download">Guardar Render en Celular</button>
    </div>

    <script>
        // --- CONFIGURACIÓN DE THREE.JS ---
        const container = document.getElementById('viewer-container');
        const canvas = document.getElementById('canvas-3d');

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
        camera.position.set(0, 2.2, 5.5); // Ajustado para que el personaje quepa bien en pantallas verticales

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, preserveDrawingBuffer: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Limita la resolución a 2x para evitar lag en teléfonos gama baja
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        // Controles de cámara optimizados para pantallas táctiles de Android
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.target.set(0, 1.3, 0); // Apunta al centro del personaje
        controls.maxDistance = 10;
        controls.minDistance = 2;

        // --- ILUMINACIÓN ---
        const ambientLight = new THREE.AmbientLight(0x221133, 1.8);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xbc13fe, 3);
        dirLight.position.set(2, 4, 3);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 512; // Menor resolución de sombra para mejor rendimiento en móvil
        dirLight.shadow.mapSize.height = 512;
        dirLight.shadow.bias = -0.002;
        scene.add(dirLight);

        // Suelo para recibir las sombras
        const floorGeo = new THREE.PlaneGeometry(10, 10);
        const floorMat = new THREE.ShadowMaterial({ opacity: 0.7 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- MODELO MINECRAFT ---
        const charGroup = new THREE.Group();
        scene.add(charGroup);

        const defaultMaterial = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9 });
        let skinMaterial = defaultMaterial;

        const parts = {
            head: new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.8, 0.8), skinMaterial),
            torso: new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), skinMaterial),
            leftArm: new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.4), skinMaterial),
            rightArm: new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.4), skinMaterial),
            leftLeg: new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.4), skinMaterial),
            rightLeg: new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.2, 0.4), skinMaterial)
        };

        parts.head.position.set(0, 2.2, 0);
        parts.torso.position.set(0, 1.2, 0);
        parts.leftArm.position.set(-0.6, 1.2, 0);
        parts.rightArm.position.set(0.6, 1.2, 0);
        parts.leftLeg.position.set(-0.2, 0.6, 0);
        parts.rightLeg.position.set(0.2, 0.6, 0);

        Object.values(parts).forEach(part => {
            part.castShadow = true;
            part.receiveShadow = true;
            charGroup.add(part);
        });

        // --- OBJETOS / ACCESORIOS ---
        let currentItem = null;

        function updateItem(type) {
            if (currentItem) scene.remove(currentItem);
            if (type === 'none') return;

            const itemGroup = new THREE.Group();
            let color = type === 'sword' ? 0x00f0ff : 0x8b5a2b;

            const handle = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.4, 0.08), new THREE.MeshStandardMaterial({ color: 0x5c4033 }));
            handle.position.y = -0.1;
            itemGroup.add(handle);

            if (type === 'sword') {
                const blade = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.0, 0.05), new THREE.MeshStandardMaterial({ color: color, roughness: 0.2, metalness: 0.8 }));
                blade.position.y = 0.5;
                itemGroup.add(blade);
            } else if (type === 'pickaxe') {
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.12, 0.1), new THREE.MeshStandardMaterial({ color: 0x00f0ff, roughness: 0.2 }));
                head.position.y = 0.15;
                itemGroup.add(head);
            }

            itemGroup.position.set(0.6, 0.7, 0.2);
            itemGroup.rotation.x = Math.PI / 3;
            
            itemGroup.traverse(child => {
                if (child.isMesh) child.castShadow = true;
            });

            currentItem = itemGroup;
            scene.add(currentItem);
        }

        // --- CONTROLADOR DE ARCHIVOS (CARGAR SKIN) ---
        const skinInput = document.getElementById('skin-input');

        skinInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const texture = new THREE.Texture(img);
                    texture.needsUpdate = true;
                    texture.magFilter = THREE.NearestFilter; // Mantener los píxeles definidos estilo Minecraft
                    texture.minFilter = THREE.NearestFilter;

                    skinMaterial = new THREE.MeshStandardMaterial({
                        map: texture,
                        roughness: 0.95,
                        metalness: 0.05
                    });

                    Object.values(parts).forEach(part => {
                        part.material = skinMaterial;
                    });
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // --- EVENTOS DE INTERFAZ ---
        document.getElementById('light-color').addEventListener('change', function(e) {
            dirLight.color.set(e.target.value);
        });

        document.getElementById('light-angle').addEventListener('input', function(e) {
            dirLight.position.x = parseFloat(e.target.value) * 2;
        });

        document.getElementById('shadow-intensity').addEventListener('input', function(e) {
            floorMat.opacity = parseFloat(e.target.value);
        });

        document.getElementById('hand-item').addEventListener('change', function(e) {
            updateItem(e.target.value);
        });

        // Guardado de la imagen directo al almacenamiento de Android
        document.getElementById('btn-download').addEventListener('click', function() {
            renderer.render(scene, camera);
            const dataURL = canvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.download = 'render-minecraft-android.png';
            link.href = dataURL;
            link.click();
        });

        // Ajustar la pantalla cuando rotas el celular o cambia de tamaño
        window.addEventListener('resize', onWindowResize, false);

        function onWindowResize() {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        // --- BUCLE DE ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
  </html>
